<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Барахолка Плюс — новые и б/у вещи</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Шапка сайта -->
    <header class="header">
        <div class="container">
            <div class="logo">Барахолка Плюс</div>
            <nav class="nav">
                <a href="index.html">Главная</a>
                <a href="catalog.html">Каталог</a>
                <a href="#">Как это работает</a>
                <a href="#">О нас</a>
                <a href="#">Контакты</a>
            </nav>
            <div class="header-actions">
                <input type="text" placeholder="Поиск..." class="search">
                <a href="#" class="icon">👤</a>
                <a href="cart.html" class="icon">🛒<span class="cart-count">0</span></a>
                <a href="#" class="icon">❤️</a>
            </div>
        </div>
    </header>

    <!-- Основной баннер -->
    <section class="banner">
        <div class="container">
            <h1>Скидки до 70% на б/у технику!</h1>
            <p>Покупайте и продавайте вещи с выгодой</p>
            <button class="btn">Посмотреть каталог</button>
            <button class="btn btn-secondary">Разместить объявление</button>
        </div>
    </section>

    <!-- Популярные категории -->
    <section class="categories">
        <div class="container">
            <h2>Популярные категории</h2>
            <div class="category-grid">
                <div class="category-card">
                    <div class="category-icon">📱</div>
                    <h3>Электроника</h3>
                </div>
                <div class="category-card">
                    <div class="category-icon">👗</div>
                    <h3>Одежда и обувь</h3>
                </div>
                <div class="category-card">
                    <div class="category-icon">🛋️</div>
                    <h3>Мебель</h3>
                </div>
                <div class="category-card">
                    <div class="category-icon">🧸</div>
                    <h3>Детские товары</h3>
                </div>
            </div>
        </div>
    </section>

    <!-- Футер -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Барахолка Плюс. Все права защищены.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
